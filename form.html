<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Form Kehadiran Guru</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c0f;--s1:#111418;--s2:#181c22;--b1:#1f2530;--b2:#2a3040;
  --acc:#f59e0b;--acc2:#10b981;--acc3:#3b82f6;--acc4:#ef4444;
  --txt:#f0f2f5;--m1:#8892a4;--m2:#58647a;
  --ff-head:'Syne',sans-serif;--ff-body:'IBM Plex Sans',sans-serif;--ff-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--ff-body);background:var(--bg);color:var(--txt);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:24px 16px 48px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* BLOB */
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.blob1{width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,.1) 0%,transparent 70%);top:-100px;left:-100px;}
.blob2{width:350px;height:350px;background:radial-gradient(circle,rgba(16,185,129,.07) 0%,transparent 70%);bottom:-50px;right:-50px;}

/* CARD */
.card{
  position:relative;z-index:1;
  width:100%;max-width:520px;
  background:var(--s1);border:1px solid var(--b1);border-radius:16px;
  overflow:hidden;
}

/* HEADER */
.card-header{
  padding:28px 28px 24px;
  border-bottom:1px solid var(--b1);
  background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(16,185,129,.04));
}
.school-name{
  font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--m1);font-family:var(--ff-mono);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.school-name::before{
  content:"";display:inline-block;width:6px;height:6px;
  border-radius:50%;background:var(--acc);flex-shrink:0;
}
.form-title{
  font-family:var(--ff-head);font-size:1.5rem;font-weight:800;
  line-height:1.2;letter-spacing:-.3px;
}
.form-title span{color:var(--acc);}
.form-subtitle{
  margin-top:8px;font-size:.82rem;color:var(--m1);
}
.kelas-badge{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;padding:7px 14px;border-radius:999px;
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);
  font-family:var(--ff-mono);font-size:.78rem;color:var(--acc);font-weight:600;
}

/* BODY */
.card-body{padding:24px 28px;}

/* FIELD */
.field{margin-bottom:20px;}
.field-label{
  display:block;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--m1);font-family:var(--ff-mono);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.field-label .req{color:var(--acc4);}
.field-input,.field-select{
  width:100%;padding:12px 16px;border-radius:10px;
  background:var(--s2);border:1px solid var(--b2);
  color:var(--txt);font-family:var(--ff-body);font-size:.92rem;
  outline:none;transition:border-color .2s,box-shadow .2s;
  appearance:none;-webkit-appearance:none;
}
.field-input:focus,.field-select:focus{
  border-color:var(--acc);
  box-shadow:0 0 0 3px rgba(245,158,11,.12);
}
.field-input::placeholder{color:var(--m2);}
.select-wrap{position:relative;}
.select-wrap::after{
  content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--m1);pointer-events:none;font-size:.9rem;
}

/* DATE TIME ROW */
.datetime-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* KETERANGAN CARDS */
.ket-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ket-card{
  position:relative;cursor:pointer;
}
.ket-card input{position:absolute;opacity:0;width:0;height:0;}
.ket-label{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;padding:16px 12px;border-radius:10px;
  border:2px solid var(--b2);background:var(--s2);
  transition:all .2s;cursor:pointer;text-align:center;
}
.ket-label:hover{border-color:var(--b1);background:var(--b1);}
.ket-card input:checked + .ket-label.masuk{
  border-color:var(--acc2);background:rgba(16,185,129,.1);
}
.ket-card input:checked + .ket-label.kosong{
  border-color:var(--acc4);background:rgba(239,68,68,.1);
}
.ket-icon{font-size:1.6rem;}
.ket-text{font-size:.8rem;font-weight:600;font-family:var(--ff-mono);}
.ket-label.masuk .ket-text{color:var(--acc2);}
.ket-label.kosong .ket-text{color:var(--acc4);}

/* DIVIDER */
.divider{height:1px;background:var(--b1);margin:4px 0 20px;}

/* SUBMIT BTN */
.btn-submit{
  width:100%;padding:14px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--acc),#d97706);
  color:#000;font-family:var(--ff-head);font-size:1rem;font-weight:700;
  cursor:pointer;transition:opacity .2s,transform .1s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.02em;
}
.btn-submit:hover{opacity:.9;}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;}
.btn-submit svg{width:18px;height:18px;}

/* SUCCESS STATE */
.success-card{
  text-align:center;padding:40px 28px;display:none;
}
.success-icon{font-size:3.5rem;margin-bottom:16px;}
.success-title{font-family:var(--ff-head);font-size:1.3rem;font-weight:700;margin-bottom:8px;color:var(--acc2);}
.success-sub{font-size:.88rem;color:var(--m1);line-height:1.7;}
.btn-reset{
  margin-top:20px;padding:10px 24px;border-radius:8px;border:1px solid var(--b2);
  background:var(--s2);color:var(--txt);font-family:var(--ff-body);
  font-size:.88rem;cursor:pointer;transition:all .2s;
}
.btn-reset:hover{border-color:var(--acc);color:var(--acc);}

/* ERROR */
.err-banner{
  display:none;margin-bottom:16px;padding:12px 16px;border-radius:8px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:var(--acc4);font-size:.83rem;line-height:1.6;
}

/* FOOTER */
.card-footer{
  padding:14px 28px;border-top:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:rgba(255,255,255,.01);
}
.footer-logo{font-family:var(--ff-mono);font-size:.68rem;color:var(--m2);}
.footer-logo span{color:var(--acc);}
.back-link{font-size:.72rem;color:var(--acc3);text-decoration:none;}
.back-link:hover{text-decoration:underline;}

/* LOADING OVERLAY */
.loading{
  display:none;position:fixed;inset:0;z-index:999;
  background:rgba(10,12,15,.8);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;flex-direction:column;gap:14px;
}
.loading.show{display:flex;}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid var(--b2);border-top-color:var(--acc);
  animation:spin .7s linear infinite;
}
.loading-text{font-family:var(--ff-mono);font-size:.82rem;color:var(--m1);}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeIn .4s ease both;}

@media(max-width:480px){
  body{padding:16px 12px 40px;}
  .card-header{padding:20px 20px 18px;}
  .card-body{padding:20px;}
  .form-title{font-size:1.25rem;}
  .datetime-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Menyimpan data…</div>
</div>

<div class="card">
  <!-- Header -->
  <div class="card-header">
    <div class="school-name">SMK Mitra Industri 02 Pati</div>
    <div class="form-title">Kehadiran <span>Guru</span></div>
    <div class="form-subtitle">Form kehadiran guru di kelas hari ini</div>
    <div class="kelas-badge" id="kelasBadge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span id="kelasLabel">Memuat…</span>
    </div>
  </div>

  <!-- Form Body -->
  <div class="card-body" id="formBody">
    <div class="err-banner" id="errBanner"></div>

    <!-- NAMA GURU -->
    <div class="field">
      <label class="field-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Nama Guru <span class="req">*</span>
      </label>
      <div class="select-wrap">
        <select class="field-input field-select" id="namaGuru" required>
          <option value="">-- Pilih Nama Guru --</option>
        </select>
      </div>
    </div>

    <!-- KETERANGAN -->
    <div class="field">
      <label class="field-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Keterangan <span class="req">*</span>
      </label>
      <div class="ket-grid">
        <label class="ket-card">
          <input type="radio" name="keterangan" value="MASUK" id="ketMasuk"/>
          <div class="ket-label masuk">
            <span class="ket-icon">✅</span>
            <span class="ket-text">MASUK</span>
          </div>
        </label>
        <label class="ket-card">
          <input type="radio" name="keterangan" value="KELAS KOSONG" id="ketKosong"/>
          <div class="ket-label kosong">
            <span class="ket-icon">🚫</span>
            <span class="ket-text">KELAS KOSONG</span>
          </div>
        </label>
      </div>
    </div>

    <div class="divider"></div>

    <!-- TANGGAL & WAKTU (auto) -->
    <div class="datetime-row" style="margin-bottom:20px;">
      <div class="field" style="margin-bottom:0">
        <label class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Tanggal
        </label>
        <input class="field-input" id="tanggal" type="text" readonly style="color:var(--m1);cursor:default;"/>
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Waktu
        </label>
        <input class="field-input" id="waktu" type="text" readonly style="color:var(--m1);cursor:default;"/>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="btn-submit" id="btnSubmit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
      Kirim Data Kehadiran
    </button>
  </div>

  <!-- Success State -->
  <div class="success-card" id="successCard">
    <div class="success-icon">✅</div>
    <div class="success-title">Data Berhasil Dikirim!</div>
    <div class="success-sub" id="successDetail">—</div>
    <button class="btn-reset" id="btnReset">Isi Form Lagi</button>
  </div>

  <!-- Footer -->
  <div class="card-footer">
    <div class="footer-logo">Monitor <span>Kehadiran</span> · SMK MI02</div>
    <a href="https://kehadiran-guru-mi02.netlify.app" class="back-link">← Lihat Dashboard</a>
  </div>
</div>

<script>
// ── APPS SCRIPT URL (sama dengan yang dipakai website) ─────
// GANTI dengan URL deployment Apps Script Anda
const APPS_SCRIPT_URL = "https://script.google.com/a/macros/smkind-mm2100.sch.id/s/AKfycbx9K0b6L3hdHF4HSQEkGWqg7HAsbWb9NvILLwdjVmH8FOffKKwOULJxBC1huYW2Crvt/exec";

// ── DATA 22 KELAS ──────────────────────────────────────────
const KELAS_LIST = [
  "X MEKATRONIKA 1",
  "X MEKATRONIKA 2",
  "X PEMESINAN 1",
  "X PEMESINAN 2",
  "X ANIMASI",
  "X OTOTRONIK",
  "XI MEKATRONIKA",
  "XI OTOTRONIK",
  "XI PEMESINAN",
  "XI ANIMASI",
  "XII MEKATRONIKA",
  "XII OTOTRONIK",
  "XII PEMESINAN",
  "XII ANIMASI",
  "XI KERJA 1",
  "XI KERJA 2",
  "XI MAGANG 1",
  "XI MAGANG 2",
  "XI & XII KULIAH",
  "XI & XII AUSBILDUNG",
  "XII KERJA",
  "XII MAGANG",
];

// ── DAFTAR GURU (sama untuk semua kelas) ──────
const SEMUA_GURU = [
  "Indra Wijaya, S.Pd",
  "Muhammad Ainun Najib, S.Pd",
  "Dhita Ayu Septianingsih, S.Pd",
  "Aimfathilah Saerozi, S.Pd",
  "Gesit Nandaru Aji, S.T",
  "Gani Mubyarto, S.Pd",
  "Ahmad August Jisa' Putra, S.Pd, M.Pd",
  "Moh. Fathurrohman, S.Ag, S.Pd",
  "Tri Puji Lestari, S. S",
  "Muhammad Sahroni",
  "Sukoco, S.Pd",
  "Syahrul Gilang Ramadhan, S.Tr.T",
  "Trisa Mariyani, S. Mat",
  "Yusuf Wahyu, S.Kom",
  "Erika Chairun Nissa, S.Pd",
  "Ilham Agum Fitra Anggesa, S.Pd., Gr",
  "Wasful Aulia, S.Pd",
  "Aprilia Ni'mah Akasah, S.Psi",
  "Amirrudin Fatah, S.Pd",
  "Hartati Mira Dewi",
  "Nila Lukito",
  "Reni Pista Saragih",
  "Renita Silvi Armanda",
  "Wijaya Putra",
  "Fatimah Azzahro",
];

// Semua kelas pakai daftar guru yang sama
const GURU_PER_KELAS = {};
for(let i=1; i<=22; i++) GURU_PER_KELAS[i] = SEMUA_GURU;
const urlParams = new URLSearchParams(window.location.search);
const kelasIdx  = parseInt(urlParams.get("k") || "0");
const kelasName = KELAS_LIST[kelasIdx - 1] || "KELAS TIDAK DIKENAL";

document.getElementById("kelasLabel").textContent = kelasName;
document.title = "Form Kehadiran — " + kelasName;

// Populate dropdown nama guru sesuai kelas
const guruList = GURU_PER_KELAS[kelasIdx] || [];
const namaGuruEl = document.getElementById("namaGuru");
// Ubah jadi select dropdown
namaGuruEl.outerHTML = `<select class="field-input field-select" id="namaGuru" required>
  <option value="">-- Pilih Nama Guru --</option>
  ${guruList.map(n=>`<option value="${n}">${n}</option>`).join("")}
</select>`;

// ── CLOCK ───────────────────────────────────────────────────
function updateClock(){
  const now = new Date();
  const tgl  = now.toLocaleDateString("id-ID",{day:"2-digit",month:"2-digit",year:"numeric"}).replace(/\//g,"/");
  const wkt  = now.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("tanggal").value = tgl;
  document.getElementById("waktu").value   = wkt;
}
updateClock();
setInterval(updateClock, 1000);

// ── SUBMIT ──────────────────────────────────────────────────
document.getElementById("btnSubmit").addEventListener("click", async()=>{
  const namaGuru   = document.getElementById("namaGuru").value.trim();
  const keterangan = document.querySelector('input[name="keterangan"]:checked')?.value || "";
  const tanggal    = document.getElementById("tanggal").value;
  const waktu      = document.getElementById("waktu").value;
  const errBanner  = document.getElementById("errBanner");

  // Validasi
  if(!namaGuru){
    showErr("⚠️ Nama guru wajib diisi."); return;
  }
  if(!keterangan){
    showErr("⚠️ Pilih keterangan: MASUK atau KELAS KOSONG."); return;
  }

  errBanner.style.display = "none";
  showLoading(true);

  try {
    // Kirim sebagai form data (lebih kompatibel dengan Apps Script sekolah)
    const formData = new FormData();
    formData.append("kelas",      kelasName);
    formData.append("namaGuru",   namaGuru);
    formData.append("keterangan", keterangan);
    formData.append("tanggal",    tanggal);
    formData.append("waktu",      waktu);

    const res = await fetch(APPS_SCRIPT_URL, {
      method:  "POST",
      mode:    "no-cors", // hindari CORS error pada domain sekolah
      body:    formData,
    });

    // no-cors = tidak bisa baca response, tapi data tetap terkirim
    showSuccess(namaGuru, keterangan, tanggal, waktu);

  } catch(err){
    showErr("❌ Koneksi gagal. Periksa internet dan coba lagi.\n" + err.message);
  } finally {
    showLoading(false);
  }
});

// ── RESET ────────────────────────────────────────────────────
document.getElementById("btnReset").addEventListener("click",()=>{
  document.getElementById("namaGuru").value = "";
  document.querySelectorAll('input[name="keterangan"]').forEach(r=>r.checked=false);
  document.getElementById("successCard").style.display="none";
  document.getElementById("formBody").style.display="block";
});

// ── HELPERS ───────────────────────────────────────────────────
function showErr(msg){
  const b = document.getElementById("errBanner");
  b.textContent = msg; b.style.display = "block";
  b.scrollIntoView({behavior:"smooth",block:"center"});
}
function showLoading(show){
  document.getElementById("loading").classList.toggle("show", show);
  document.getElementById("btnSubmit").disabled = show;
}
function showSuccess(guru, ket, tgl, wkt){
  document.getElementById("formBody").style.display="none";
  document.getElementById("successCard").style.display="block";
  document.getElementById("successDetail").innerHTML =
    `<strong style="color:var(--txt)">${kelasName}</strong><br>
     Guru: <strong style="color:var(--acc2)">${guru}</strong><br>
     Status: <strong style="color:${ket==="MASUK"?"var(--acc2)":"var(--acc4)"}">${ket}</strong><br>
     <span style="color:var(--m2);font-size:.8rem">${tgl} · ${wkt}</span>`;
}
</script>
</body>
</html>
